AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFront distribution in front of ALB — free HTTPS on *.cloudfront.net domain

Parameters:
  AppName:
    Type: String
  ALBDnsName:
    Type: String

Resources:
  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub '${AppName} distribution'
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        Origins:
          - Id: alb-origin
            DomainName: !Ref ALBDnsName
            CustomOriginConfig:
              HTTPPort: 80
              OriginProtocolPolicy: http-only
        DefaultCacheBehavior:
          TargetOriginId: alb-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - POST
            - PATCH
            - DELETE
          CachedMethods:
            - GET
            - HEAD
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
          OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3  # AllViewer
        Tags:
          - Key: Name
            Value: !Sub '${AppName}-cdn'

Outputs:
  DistributionDomainName:
    Description: CloudFront domain name (use this to access the app)
    Value: !GetAtt Distribution.DomainName
  DistributionId:
    Description: CloudFront distribution ID
    Value: !Ref Distribution
